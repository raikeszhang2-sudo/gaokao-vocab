<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>List 35 - 高考词汇朗读</title><link rel="stylesheet" href="../style.css"></head><body><div class="wrap">
<a class="toplink noprint" href="../index.html">← 返回首页</a>
<div class="card"><h1>List 35</h1><p class="muted">62 个单词。点击单词即可播放英文发音。</p>
<div class="controls noprint">
<button onclick="playSeq()">顺序播放</button><button class="secondary" onclick="playRandom()">随机播放</button><button class="stop" onclick="stopPlay()">停止</button>
<label>语速 <select id="rate"><option value="0.75">慢速</option><option value="0.9" selected>正常偏慢</option><option value="1">正常</option></select></label>
<label>间隔 <input id="gap" type="number" min="0.5" max="6" step="0.5" value="1.2" style="width:70px"> 秒</label>
</div></div>
<div id="wordgrid" class="wordgrid"></div>
</div><script>
const words = ["import", "gift", "dynasty", "ice", "huge", "frozen)", "down", "domain", "flavour", "afford", "marine", "see", "seen)", "guess", "crop", "rock", "usual", "nation", "mount", "enable", "come", "come)", "drive", "fall", "madam", "membership", "baby", "attend", "constitution", "your", "vast", "map", "bet", "explore", "just", "spread", "less", "spirit", "jeans", "landscape", "manage", "conference", "champion", "expense", "duck", "against", "electricity", "headline", "distance", "board", "income", "bacteria", "public", "aboard", "surgery", "arrest", "invention", "endangered", "drawer", "knife", "barbecue", "America"];
let playing=false, timer=null, activeIndex=-1;
const grid=document.getElementById('wordgrid');
words.forEach((w,i)=>{const d=document.createElement('div');d.className='word';d.textContent=w;d.onclick=()=>speak(w,i);grid.appendChild(d);});
function mark(i){document.querySelectorAll('.word').forEach((e,j)=>e.classList.toggle('active',j===i));}
function speak(w,i){window.speechSynthesis.cancel(); mark(i); const u=new SpeechSynthesisUtterance(w); u.lang='en-US'; u.rate=parseFloat(document.getElementById('rate').value||'0.9'); window.speechSynthesis.speak(u);}
function stopPlay(){playing=false; clearTimeout(timer); window.speechSynthesis.cancel(); mark(-1);}
function playList(arr,pos=0){ if(!playing||pos>=arr.length){playing=false;return;} const i=arr[pos]; speak(words[i],i); const gap=parseFloat(document.getElementById('gap').value||'1.2')*1000; timer=setTimeout(()=>playList(arr,pos+1), Math.max(900,gap+900)); }
function playSeq(){stopPlay(); playing=true; playList(words.map((_,i)=>i));}
function playRandom(){stopPlay(); playing=true; const arr=words.map((_,i)=>i).sort(()=>Math.random()-0.5); playList(arr);}
</script></body></html>
