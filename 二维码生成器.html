<!doctype html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>二维码生成器</title><link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>.qrgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:18px}.qrcard{text-align:center;border:1px solid #ddd;border-radius:12px;padding:12px;background:#fff}.qrcard canvas,.qrcard img{margin:auto}.small{font-size:12px;color:#667085;word-break:break-all}</style></head><body><div class="wrap">
<div class="card noprint"><h1>二维码生成器</h1><p>输入你的 GitHub Pages 主页网址，点击生成。例：https://用户名.github.io/gaokao-vocab/</p>
<input id="base" style="width:100%" placeholder="粘贴你的主页网址"><div class="controls"><button onclick="make()">生成二维码</button><button class="secondary" onclick="window.print()">打印</button></div>
<p class="muted">如果二维码生成不出来，先确认电脑可以联网；此页使用浏览器在线加载二维码脚本。</p></div>
<div id="out" class="qrgrid"></div></div>
<script>
function make(){let base=document.getElementById('base').value.trim(); if(!base){alert('请先输入主页网址');return;} if(!base.endsWith('/')) base+='/'; const out=document.getElementById('out'); out.innerHTML='';
for(let i=1;i<=52;i++){const url=base+'lists/list'+i+'.html'; const c=document.createElement('div'); c.className='qrcard'; c.innerHTML='<h3>List '+i+'</h3><div id="qr'+i+'"></div><div class="small">'+url+'</div>'; out.appendChild(c); new QRCode(document.getElementById('qr'+i),{text:url,width:120,height:120});}}
</script></body></html>
